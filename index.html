<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Questions</title>
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f3;
    --color-text-primary: #111111;
    --color-text-secondary: #666666;
    --color-text-tertiary: #999999;
    --color-border-primary: rgba(0,0,0,0.4);
    --color-border-secondary: rgba(0,0,0,0.28);
    --color-border-tertiary: rgba(0,0,0,0.13);
    --font-serif: Georgia, 'Times New Roman', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1e;
      --color-background-secondary: #2c2c2e;
      --color-text-primary: #f2f2f7;
      --color-text-secondary: #aeaeb2;
      --color-text-tertiary: #636366;
      --color-border-primary: rgba(255,255,255,0.4);
      --color-border-secondary: rgba(255,255,255,0.25);
      --color-border-tertiary: rgba(255,255,255,0.1);
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--color-background-secondary);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2.5rem 1rem 4rem;
  }
  .wrap { width: 100%; max-width: 520px; }
  .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0 }

  .pill-teal   { background: #E1F5EE; color: #085041; }
  .pill-purple { background: #EEEDFE; color: #3C3489; }
  .pill-coral  { background: #FAECE7; color: #993C1D; }
  @media (prefers-color-scheme: dark) {
    .pill-teal   { background: #085041; color: #9FE1CB; }
    .pill-purple { background: #3C3489; color: #CECBF6; }
    .pill-coral  { background: #712B13; color: #F5C4B3; }
  }
  .dot { width:7px;height:7px;border-radius:50%;background:var(--color-border-secondary);transition:background .2s;flex-shrink:0 }
  .dot.active { background: var(--color-text-primary); }
  .dot.done   { background: var(--color-text-secondary); }
  .sbtn {
    padding:5px 14px;font-size:13px;border:none;cursor:pointer;border-radius:6px;
    background:transparent;color:var(--color-text-secondary);transition:all .15s;
    display:flex;align-items:center;gap:5px;font-family:var(--font-sans);
  }
  .sbtn.on {
    background:var(--color-background-primary);color:var(--color-text-primary);
    font-weight:500;border:0.5px solid var(--color-border-tertiary);
  }
  textarea:focus { outline: none; border-color: var(--color-border-primary) !important; }
</style>
</head>
<body>
<div class="wrap">

<h2 class="sr-only">Daily questions journal — morning and evening micro-journal</h2>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem">
  <div style="display:flex;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:3px;gap:2px">
    <button id="btn-m" class="sbtn on" onclick="setSession('morning')"><i class="ti ti-sun" aria-hidden="true" style="font-size:14px"></i>Morning</button>
    <button id="btn-e" class="sbtn" onclick="setSession('evening')"><i class="ti ti-moon" aria-hidden="true" style="font-size:14px"></i>Evening</button>
  </div>
  <span id="date-out" style="font-size:13px;color:var(--color-text-tertiary)"></span>
</div>

<div id="card-area"></div>

<div style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem">
  <button id="btn-prev" onclick="navPrev()" style="padding:8px 14px;font-size:14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;color:var(--color-text-secondary)">
    <i id="prev-ico" class="ti ti-arrow-left" aria-hidden="true"></i>
  </button>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="dots" style="display:flex;gap:6px;align-items:center"></div>
    <button id="share-btn" onclick="showShare()" title="Share session" style="padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;color:var(--color-text-secondary);display:flex;align-items:center">
      <i class="ti ti-share" aria-hidden="true" style="font-size:14px"></i>
    </button>
  </div>
  <button id="btn-next" onclick="navNext()" style="padding:8px 16px;font-size:14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;color:var(--color-text-primary);font-weight:500;display:flex;align-items:center;gap:6px;font-family:var(--font-sans)">
    <span id="next-lbl">Next</span><i id="next-ico" class="ti ti-arrow-right" aria-hidden="true"></i>
  </button>
</div>

</div>

<script>
const Qs=[
  {s:'Show-up questions',t:'What am I grateful for?',p:'pill-teal'},
  {s:'Show-up questions',t:'Who do I love?',p:'pill-teal'},
  {s:'Show-up questions',t:'Why am I so happy?',p:'pill-teal'},
  {s:'Step-up questions',t:'What am I committed to doing that I may have been neglecting?',p:'pill-purple'},
  {s:'Step-up questions',t:'How committed am I to doing it?',p:'pill-purple'},
  {s:'Give-back questions',t:{morning:'What is my intention today?',evening:'What is my intention tomorrow?'},p:'pill-coral'},
  {s:'Give-back questions',t:'What is my wish?',p:'pill-coral'},
  {s:'Give-back questions',t:'Why am I here?',p:'pill-coral'},
];
let ses='morning',idx=0,view='question';
const ans={morning:Array(8).fill(''),evening:Array(8).fill('')};
const priv={morning:Array(8).fill(false),evening:Array(8).fill(false)};
function qt(i,s){s=s||ses;return typeof Qs[i].t==='object'?Qs[i].t[s]:Qs[i].t;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function saveCur(){const e=document.getElementById('q-ans');if(e)ans[ses][idx]=e.value;}

function setSession(s){
  saveCur();ses=s;
  document.getElementById('btn-m').className='sbtn'+(s==='morning'?' on':'');
  document.getElementById('btn-e').className='sbtn'+(s==='evening'?' on':'');
  if(view==='share')showShare();
  else if(view==='done')showDone();
  else renderQ();
}
function navPrev(){
  if(view!=='question'){view='question';renderQ();return;}
  if(idx===0)return;
  saveCur();idx--;renderQ();
}
function navNext(){
  if(view!=='question')return;
  saveCur();
  if(idx===7)showDone();
  else{idx++;renderQ();}
}

function renderQ(){
  view='question';
  const q=Qs[idx],isP=priv[ses][idx];
  document.getElementById('card-area').innerHTML=`
    <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.75rem;min-height:270px;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
        <span class="${q.p}" style="font-size:12px;font-weight:500;padding:3px 10px;border-radius:var(--border-radius-md)">${q.s}</span>
        <span style="font-size:12px;color:var(--color-text-tertiary)">${idx+1} / ${Qs.length}</span>
      </div>
      <p style="font-family:var(--font-serif);font-size:23px;line-height:1.45;font-weight:400;color:var(--color-text-primary);margin:0 0 1.5rem;min-height:70px">${qt(idx)}</p>
      <textarea id="q-ans" rows="3" placeholder="Your answer…" oninput="ans[ses][idx]=this.value" style="width:100%;box-sizing:border-box;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:.75rem;font-size:15px;font-family:var(--font-sans);color:var(--color-text-primary);resize:none;line-height:1.6;outline:none">${esc(ans[ses][idx])}</textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px">
        <button onclick="priv[ses][idx]=!priv[ses][idx];renderQ()" style="border:none;background:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px;font-size:12px;font-family:var(--font-sans);color:${isP?'var(--color-text-secondary)':'var(--color-text-tertiary)'}">
          <i class="ti ti-eye${isP?'-off':''}" aria-hidden="true" style="font-size:14px"></i>${isP?'Private':'Visible when shared'}
        </button>
      </div>
    </div>`;
  const prev=document.getElementById('btn-prev');
  prev.style.opacity=idx===0?'0.3':'1';
  prev.style.pointerEvents=idx===0?'none':'auto';
  document.getElementById('prev-ico').className='ti ti-arrow-left';
  document.getElementById('btn-next').style.opacity='1';
  document.getElementById('btn-next').style.pointerEvents='auto';
  document.getElementById('next-lbl').textContent=idx===7?'Done':'Next';
  document.getElementById('next-ico').className=idx===7?'ti ti-check':'ti ti-arrow-right';
  document.getElementById('share-btn').style.display='flex';
  document.getElementById('dots').innerHTML=Qs.map((_,i)=>`<div class="dot${i===idx?' active':ans[ses][i].trim()?' done':''}"></div>`).join('');
  document.getElementById('date-out').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('q-ans').focus();
}

function showDone(){
  view='done';
  const count=ans[ses].filter(a=>a.trim()).length;
  document.getElementById('card-area').innerHTML=`
    <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.75rem;min-height:270px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:1rem">
      <i class="ti ti-circle-check" style="font-size:44px;color:#0F6E56" aria-hidden="true"></i>
      <p style="font-family:var(--font-serif);font-size:24px;color:var(--color-text-primary);margin:0">${ses==='morning'?'Good morning.':'Good evening.'}</p>
      <p style="font-size:14px;color:var(--color-text-secondary);margin:0">${count} of 8 questions answered</p>
      <div style="display:flex;gap:8px;margin-top:.5rem">
        <button onclick="idx=0;renderQ()" style="padding:7px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;color:var(--color-text-secondary);font-family:var(--font-sans)">Review</button>
        <button onclick="showShare()" style="padding:7px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;color:var(--color-text-primary);font-weight:500;font-family:var(--font-sans);display:flex;align-items:center;gap:5px"><i class="ti ti-share" aria-hidden="true" style="font-size:14px"></i>Share session</button>
      </div>
    </div>`;
  document.getElementById('prev-ico').className='ti ti-arrow-left';
  document.getElementById('btn-prev').style.opacity='0.8';
  document.getElementById('btn-prev').style.pointerEvents='auto';
  document.getElementById('btn-next').style.opacity='0.3';
  document.getElementById('btn-next').style.pointerEvents='none';
  document.getElementById('share-btn').style.display='none';
  document.getElementById('dots').innerHTML=Qs.map((_,i)=>`<div class="dot${ans[ses][i].trim()?' done':''}"></div>`).join('');
}

function showShare(){
  view='share';saveCur();
  const secs=[
    {l:'Show-up questions',p:'pill-teal',r:[0,1,2]},
    {l:'Step-up questions',p:'pill-purple',r:[3,4]},
    {l:'Give-back questions',p:'pill-coral',r:[5,6,7]},
  ];
  let html=`<div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.75rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <p style="font-size:14px;font-weight:500;color:var(--color-text-primary);margin:0">${ses==='morning'?'Morning':'Evening'} · ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric'})}</p>
      <p style="font-size:12px;color:var(--color-text-tertiary);font-style:italic;margin:0">Share preview</p>
    </div>`;
  secs.forEach(sec=>{
    html+=`<div style="margin-bottom:1.25rem"><span class="${sec.p}" style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--border-radius-md);display:inline-block;margin-bottom:.75rem">${sec.l}</span>`;
    sec.r.forEach(i=>{
      const isP=priv[ses][i],a=esc(ans[ses][i].trim());
      html+=`<div style="display:flex;gap:10px;margin-bottom:.75rem;align-items:flex-start">
        <button onclick="priv['${ses}'][${i}]=!priv['${ses}'][${i}];showShare()" title="Toggle privacy" style="flex-shrink:0;border:none;background:none;cursor:pointer;padding:2px 0 0;font-size:15px;color:${isP?'var(--color-text-secondary)':'var(--color-text-tertiary)'}">
          <i class="ti ti-eye${isP?'-off':''}" aria-hidden="true"></i>
        </button>
        <div style="flex:1">
          <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 3px">${qt(i)}</p>
          ${isP?`<p style="font-size:14px;color:var(--color-text-tertiary);font-style:italic;margin:0">Kept private</p>`
               :a?`<p style="font-size:14px;color:var(--color-text-primary);margin:0;line-height:1.5">${a}</p>`
               :`<p style="font-size:14px;color:var(--color-text-tertiary);font-style:italic;margin:0">Not answered</p>`}
        </div>
      </div>`;
    });
    html+='</div>';
  });
  html+=`<div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:1rem;display:flex;justify-content:flex-end">
    <button onclick="copyShare()" style="padding:7px 16px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;color:var(--color-text-primary);font-weight:500;font-family:var(--font-sans);display:flex;align-items:center;gap:6px">
      <i id="copy-ico" class="ti ti-copy" aria-hidden="true" style="font-size:14px"></i><span id="copy-lbl">Copy to clipboard</span>
    </button>
  </div></div>`;
  document.getElementById('card-area').innerHTML=html;
  document.getElementById('btn-prev').style.opacity='1';
  document.getElementById('btn-prev').style.pointerEvents='auto';
  document.getElementById('prev-ico').className='ti ti-arrow-left';
  document.getElementById('btn-next').style.opacity='0.3';
  document.getElementById('btn-next').style.pointerEvents='none';
  document.getElementById('share-btn').style.display='none';
  document.getElementById('dots').innerHTML='';
  document.getElementById('date-out').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function copyShare(){
  let t=`${ses==='morning'?'Morning':'Evening'} — ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}\n\n`;
  [{l:'SHOW-UP QUESTIONS',r:[0,1,2]},{l:'STEP-UP QUESTIONS',r:[3,4]},{l:'GIVE-BACK QUESTIONS',r:[5,6,7]}].forEach(sec=>{
    t+=sec.l+'\n';
    sec.r.forEach(i=>{t+=qt(i)+'\n'+(priv[ses][i]?'[kept private]':(ans[ses][i].trim()||'—'))+'\n\n';});
  });
  navigator.clipboard.writeText(t.trim()).then(()=>{
    document.getElementById('copy-lbl').textContent='Copied!';
    document.getElementById('copy-ico').className='ti ti-check';
    setTimeout(()=>{const l=document.getElementById('copy-lbl'),ic=document.getElementById('copy-ico');if(l){l.textContent='Copy to clipboard';ic.className='ti ti-copy';}},2000);
  }).catch(()=>{});
}

renderQ();
</script>
</body>
</html>
